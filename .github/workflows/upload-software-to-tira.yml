name: Upload Docker Software to TIRA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'      # <-- THIS is the line that fixes your error

      - name: Install TIRA CLI
        run: pip install tira

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to TIRA
        run: tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}

      - name: Upload to TIRA
        run: |
          tira-cli code-submission \
            --path . \
            --task generative-ai-authorship-verification-panclef-2026 \
            --dataset pan26-generative-ai-detection-smoke-test-20260330-training \
            --command 'python3 /app/script.py -i $inputDataset/dataset.jsonl -o $outputDir' \
            # --dry-run